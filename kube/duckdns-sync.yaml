apiVersion: v1
kind: ServiceAccount
metadata:
  name: duckdns-sync-sa
  namespace: ${TARGET_ENV}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: duckdns-sync-role
rules:
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: duckdns-sync-binding
subjects:
- kind: ServiceAccount
  name: duckdns-sync-sa
  namespace: ${TARGET_ENV}
roleRef:
  kind: ClusterRole
  name: duckdns-sync-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: duckdns-sync
  namespace: ${TARGET_ENV}
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: duckdns-sync-sa
          containers:
          - name: sync
            image: bitnami/kubectl:latest
            env:
            - name: DUCKDNS_DOMAIN
              value: "taskflow-${TARGET_ENV}"
            - name: DUCKDNS_TOKEN
              value: "${DUCKDNS_TOKEN}"
            command:
            - /bin/bash
            - -c
            - |
              # Get NLB Hostname from the Ingress-Nginx Service
              NLB_HOST=$(kubectl get svc ingress-nginx-controller -n kube-system -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
              if [ -z "$NLB_HOST" ]; then echo "NLB Host not found yet. Retrying..."; exit 0; fi
              
              # Resolve NLB to IP (Using ping -c 1 because bitnami is slim)
              NLB_IP=$(getent hosts $NLB_HOST | awk '{ print $1 }' | head -n 1)
              if [ -z "$NLB_IP" ]; then echo "Could not resolve $NLB_HOST. Retrying..."; exit 0; fi
              
              # Update DuckDNS
              echo "Updating DuckDNS domain $DUCKDNS_DOMAIN with IP $NLB_IP..."
              RESULT=$(curl -s "https://www.duckdns.org/update?domains=$DUCKDNS_DOMAIN&token=$DUCKDNS_TOKEN&ip=$NLB_IP")
              echo "DuckDNS Response: $RESULT"
          restartPolicy: OnFailure
