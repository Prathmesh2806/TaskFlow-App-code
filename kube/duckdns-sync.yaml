apiVersion: v1
kind: ServiceAccount
metadata:
  name: duckdns-sync-sa
  namespace: ${TARGET_ENV}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: duckdns-sync-role
rules:
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: duckdns-sync-binding
subjects:
- kind: ServiceAccount
  name: duckdns-sync-sa
  namespace: ${TARGET_ENV}
roleRef:
  kind: ClusterRole
  name: duckdns-sync-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: duckdns-sync
  namespace: ${TARGET_ENV}
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: duckdns-sync-sa
          containers:
          - name: sync
            image: alpine:3.18
            env:
            - name: DUCKDNS_DOMAIN
              value: "TaskFlow-${TARGET_ENV}"
            - name: DUCKDNS_TOKEN
              value: "${DUCKDNS_TOKEN}"
            command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache curl bind-tools
              # 1. Get NLB Hostname from the Ingress-Nginx Service
              NLB_HOST=$(kubectl get svc ingress-nginx-controller -n kube-system -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
              if [ -z "$NLB_HOST" ]; then echo "NLB Host not found yet. Retrying..."; exit 0; fi
              
              # 2. Resolve NLB to IP
              NLB_IP=$(dig +short $NLB_HOST | head -n 1)
              if [ -z "$NLB_IP" ]; then echo "Could not resolve $NLB_HOST. Retrying..."; exit 0; fi
              
              # 3. Update DuckDNS
              echo "Updating DuckDNS domain $DUCKDNS_DOMAIN with IP $NLB_IP..."
              RESULT=$(curl -s "https://www.duckdns.org/update?domains=$DUCKDNS_DOMAIN&token=$DUCKDNS_TOKEN&ip=$NLB_IP")
              echo "DuckDNS Response: $RESULT"
          restartPolicy: OnFailure
