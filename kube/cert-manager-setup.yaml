apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Use the Let's Encrypt production URL
    server: https://acme-v02.api.letsencrypt.org/directory
    # Email for expiration warnings (placeholder)
    email: admin@TaskFlow-${TARGET_ENV}.duckdns.org
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx
