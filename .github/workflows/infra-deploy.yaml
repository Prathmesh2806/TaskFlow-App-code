name: "Infrastructure Deployment"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to target (for EKS clusters)'
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
          - dr
        default: 'dev'
      action:
        description: 'Terraform Action'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: 'apply'

jobs:
  infrastructure:
    name: "Targeted Infrastructure"
    runs-on: ubuntu-latest
    env:
      ENV: ${{ github.event.inputs.environment || 'dev' }}
      ACTION: ${{ github.event.inputs.action || 'apply' }}
      AWS_REGION: us-east-1
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure Master S3 Backend Exists
        run: |
          # Use a single shared bucket for the master state file
          RAW_BUCKET_NAME="taskflow-terraform-state-master-${{ github.repository_owner }}"
          BUCKET_NAME=$(echo "$RAW_BUCKET_NAME" | tr '[:upper:]' '[:lower:]')
          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            aws s3api create-bucket --bucket "$BUCKET_NAME" --region ${{ env.AWS_REGION }}
            aws s3api put-bucket-versioning --bucket "$BUCKET_NAME" --versioning-configuration Status=Enabled
          fi
          sed -i "s/__ENV_BUCKET__/$BUCKET_NAME/g" infrastructure/backend.conf

      - name: Pre-Destroy Cleanup (For EKS & IAM)
        if: env.ACTION == 'destroy'
        run: |
          CLUSTER_NAME="TaskFlow-${{ env.ENV }}-cluster"
          echo "Running pre-destroy cleanup for $CLUSTER_NAME..."
          
          # 1. Force detach ALB Controller IAM Policy from any roles
          ALB_POLICY_ARN=$(aws iam list-policies --query "Policies[?PolicyName=='TaskFlow-${{ env.ENV }}-aws-load-balancer-controller'].Arn" --output text || true)
          if [ -n "$ALB_POLICY_ARN" ]; then
            ROLES=$(aws iam list-entities-for-policy --policy-arn "$ALB_POLICY_ARN" --query 'PolicyRoles[*].RoleName' --output text 2>/dev/null || true)
            for ROLE in $ROLES; do
              echo "Detaching $ALB_POLICY_ARN from $ROLE..."
              aws iam detach-role-policy --role-name "$ROLE" --policy-arn "$ALB_POLICY_ARN" || true
            done
          fi

          # 2. Force delete any remaining EKS nodegroups
          NODEGROUPS=$(aws eks list-nodegroups --cluster-name "$CLUSTER_NAME" --region ${{ env.AWS_REGION }} --query 'nodegroups[*]' --output text 2>/dev/null || true)
          for NG in $NODEGROUPS; do
            echo "Deleting lingering nodegroup: $NG..."
            aws eks delete-nodegroup --cluster-name "$CLUSTER_NAME" --nodegroup-name "$NG" --region ${{ env.AWS_REGION }} || true
          done
          
          # Wait for nodegroups to be deleted
          for NG in $NODEGROUPS; do
            echo "Waiting for nodegroup $NG to be fully deleted..."
            aws eks wait nodegroup-deleted --cluster-name "$CLUSTER_NAME" --nodegroup-name "$NG" --region ${{ env.AWS_REGION }} || true
          done
          echo "Cleanup finished."

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init -backend-config=backend.conf
        working-directory: infrastructure

      - name: Terraform Action (Targeted)
        run: |
          # Use targets for Plan/Apply to protect other clusters
          # Use FULL ACTION for Destroy to ensure all dependencies are cleaned up
          if [ "${{ env.ACTION }}" == "destroy" ]; then
            TARGET_FLAGS=""
          else
            TARGET_FLAGS="-target=module.network -target=module.ecr -target=module.eks"
          fi
          
          if [ "${{ env.ACTION }}" == "plan" ]; then
            terraform plan $TARGET_FLAGS -var-file=envs/${{ env.ENV }}.tfvars
          else
            terraform ${{ env.ACTION }} $TARGET_FLAGS -auto-approve -var-file=envs/${{ env.ENV }}.tfvars
          fi
        working-directory: infrastructure
