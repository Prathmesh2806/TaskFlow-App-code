name: "Application Deployment"

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target Environment'
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
          - dr
        default: 'dev'
      custom_tag:
        description: 'Custom Tag (Optional)'
        required: false
        default: ''
      deploy_frontend:
        description: 'Deploy Frontend'
        type: boolean
        default: true
      deploy_user_service:
        description: 'Deploy User Service'
        type: boolean
        default: true
      deploy_project_service:
        description: 'Deploy Project Service'
        type: boolean
        default: true
      deploy_task_service:
        description: 'Deploy Task Service'
        type: boolean
        default: true

jobs:
  deploy:
    name: "Build and Deploy Microservices"
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      TARGET_ENV: ${{ github.event.inputs.target_env || 'dev' }}
      # Tagging logic: Use custom tag if provided, otherwise use short SHA
      IMAGE_TAG: ${{ github.event.inputs.custom_tag != '' && github.event.inputs.custom_tag || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push Frontend
        if: github.event.inputs.deploy_frontend == 'true'
        run: |
          REPO_NAME="taskflow-shared-frontend"
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          docker build -t $REGISTRY/$REPO_NAME:${{ env.IMAGE_TAG }} frontend/
          docker push $REGISTRY/$REPO_NAME:${{ env.IMAGE_TAG }}

      - name: Build and Push User Service
        if: github.event.inputs.deploy_user_service == 'true'
        run: |
          REPO_NAME="taskflow-shared-user-service"
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          docker build -t $REGISTRY/$REPO_NAME:${{ env.IMAGE_TAG }} services/user-service/
          docker push $REGISTRY/$REPO_NAME:${{ env.IMAGE_TAG }}

      - name: Build and Push Project Service
        if: github.event.inputs.deploy_project_service == 'true'
        run: |
          REPO_NAME="taskflow-shared-project-service"
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          docker build -t $REGISTRY/$REPO_NAME:${{ env.IMAGE_TAG }} services/project-service/
          docker push $REGISTRY/$REPO_NAME:${{ env.IMAGE_TAG }}

      - name: Build and Push Task Service
        if: github.event.inputs.deploy_task_service == 'true'
        run: |
          REPO_NAME="taskflow-shared-task-service"
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          docker build -t $REGISTRY/$REPO_NAME:${{ env.IMAGE_TAG }} services/task-service/
          docker push $REGISTRY/$REPO_NAME:${{ env.IMAGE_TAG }}

      - name: Update EKS Kubeconfig
        run: aws eks update-kubeconfig --name "TaskFlow-${{ env.TARGET_ENV }}-cluster" --region ${{ env.AWS_REGION }}

      - name: Deploy Selected Services
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          
          # Replace placeholder with current image tag in all YAML files
          sed -i "s|:latest|:${{ env.IMAGE_TAG }}|g" kube/*.yaml
          sed -i "s|\${ECR_URL}|$REGISTRY/taskflow-shared|g" kube/*.yaml

          # Selectively apply based on checkboxes
          if [ "${{ github.event.inputs.deploy_frontend }}" == "true" ]; then kubectl apply -f kube/frontend-deploy.yaml; fi
          if [ "${{ github.event.inputs.deploy_user_service }}" == "true" ]; then kubectl apply -f kube/user-service-deploy.yaml; fi
          if [ "${{ github.event.inputs.deploy_project_service }}" == "true" ]; then kubectl apply -f kube/project-service-deploy.yaml; fi
          if [ "${{ github.event.inputs.deploy_task_service }}" == "true" ]; then kubectl apply -f kube/task-service-deploy.yaml; fi
          
          # Always apply shared resources like Postgres and Ingress
          kubectl apply -f kube/postgres-deploy.yaml
          kubectl apply -f kube/taskflow-ingress.yaml
