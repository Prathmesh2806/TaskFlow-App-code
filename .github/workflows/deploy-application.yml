name: "Application Deployment"

on:
  workflow_dispatch:
    inputs:
      target_resource:
        description: 'Target Resource'
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
          - dr
        default: 'dev'
      
      # Service Checkboxes
      deploy_frontend:
        description: 'Deploy Frontend'
        type: boolean
        default: true
      deploy_user_service:
        description: 'Deploy User Service'
        type: boolean
        default: true
      deploy_project_service:
        description: 'Deploy Project Service'
        type: boolean
        default: true
      deploy_task_service:
        description: 'Deploy Task Service'
        type: boolean
        default: true
      deploy_database:
        description: 'Deploy Database (Custom Postgres)'
        type: boolean
        default: true

      # Specific Image Tags (Optional - Defaults to service-name-sha)
      frontend_tag:
        description: 'Frontend Tag (blank for auto)'
        required: false
      user_tag:
        description: 'User Service Tag (blank for auto)'
        required: false
      project_tag:
        description: 'Project Service Tag (blank for auto)'
        required: false
      task_tag:
        description: 'Task Service Tag (blank for auto)'
        required: false
      database_tag:
        description: 'Database Tag (blank for auto)'
        required: false

jobs:
  deploy:
    name: "Build and Deploy Microservices"
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      TARGET_ENV: ${{ github.event.inputs.target_resource || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Get Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push Frontend
        if: github.event.inputs.deploy_frontend == 'true'
        run: |
          SERVICE="frontend"
          COMMIT_TAG="${SERVICE}-${{ steps.vars.outputs.sha_short }}"
          TAG="${{ github.event.inputs.frontend_tag }}"
          [ -z "$TAG" ] && TAG="$COMMIT_TAG"
          
          REPO_NAME="taskflow-shared-$SERVICE"
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          docker build -t $REGISTRY/$REPO_NAME:$TAG frontend/
          docker push $REGISTRY/$REPO_NAME:$TAG
          echo "FRONTEND_TAG=$TAG" >> $GITHUB_ENV

      - name: Build and Push User Service
        if: github.event.inputs.deploy_user_service == 'true'
        run: |
          SERVICE="user-service"
          COMMIT_TAG="${SERVICE}-${{ steps.vars.outputs.sha_short }}"
          TAG="${{ github.event.inputs.user_tag }}"
          [ -z "$TAG" ] && TAG="$COMMIT_TAG"
          
          REPO_NAME="taskflow-shared-$SERVICE"
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          docker build -t $REGISTRY/$REPO_NAME:$TAG services/user-service/
          docker push $REGISTRY/$REPO_NAME:$TAG
          echo "USER_TAG=$TAG" >> $GITHUB_ENV

      - name: Build and Push Project Service
        if: github.event.inputs.deploy_project_service == 'true'
        run: |
          SERVICE="project-service"
          COMMIT_TAG="${SERVICE}-${{ steps.vars.outputs.sha_short }}"
          TAG="${{ github.event.inputs.project_tag }}"
          [ -z "$TAG" ] && TAG="$COMMIT_TAG"
          
          REPO_NAME="taskflow-shared-$SERVICE"
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          docker build -t $REGISTRY/$REPO_NAME:$TAG services/project-service/
          docker push $REGISTRY/$REPO_NAME:$TAG
          echo "PROJECT_TAG=$TAG" >> $GITHUB_ENV

      - name: Build and Push Task Service
        if: github.event.inputs.deploy_task_service == 'true'
        run: |
          SERVICE="task-service"
          COMMIT_TAG="${SERVICE}-${{ steps.vars.outputs.sha_short }}"
          TAG="${{ github.event.inputs.task_tag }}"
          [ -z "$TAG" ] && TAG="$COMMIT_TAG"
          
          REPO_NAME="taskflow-shared-$SERVICE"
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          docker build -t $REGISTRY/$REPO_NAME:$TAG services/task-service/
          docker push $REGISTRY/$REPO_NAME:$TAG
          echo "TASK_TAG=$TAG" >> $GITHUB_ENV

      - name: Build and Push Database Service
        if: github.event.inputs.deploy_database == 'true'
        run: |
          SERVICE="database"
          COMMIT_TAG="${SERVICE}-${{ steps.vars.outputs.sha_short }}"
          TAG="${{ github.event.inputs.database_tag }}"
          [ -z "$TAG" ] && TAG="$COMMIT_TAG"
          
          REPO_NAME="taskflow-shared-$SERVICE"
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          # Use /db folder for custom database image
          docker build -t $REGISTRY/$REPO_NAME:$TAG db/
          docker push $REGISTRY/$REPO_NAME:$TAG
          echo "DATABASE_TAG=$TAG" >> $GITHUB_ENV

      - name: Update EKS Kubeconfig
        run: aws eks update-kubeconfig --name "TaskFlow-${{ env.TARGET_ENV }}-cluster" --region ${{ env.AWS_REGION }}

      - name: Deploy Selected Services
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          
          # Replace Registry URL
          sed -i "s|\${ECR_URL}|$REGISTRY/taskflow-shared|g" kube/*.yaml

          # Replace Tags in specific files (using the actually used tags from env)
          sed -i "s|:latest|:${{ env.FRONTEND_TAG || 'frontend-default' }}|g" kube/frontend-deploy.yaml
          sed -i "s|:latest|:${{ env.USER_TAG || 'user-default' }}|g" kube/user-service-deploy.yaml
          sed -i "s|:latest|:${{ env.PROJECT_TAG || 'project-default' }}|g" kube/project-service-deploy.yaml
          sed -i "s|:latest|:${{ env.TASK_TAG || 'task-default' }}|g" kube/task-service-deploy.yaml
          
          # Database image replacement logic (targeting custom ECR repo)
          sed -i "s|image: postgres:15|image: $REGISTRY/taskflow-shared-database:${{ env.DATABASE_TAG }}|g" kube/postgres-deploy.yaml

          # Selectively apply based on checkboxes
          if [ "${{ github.event.inputs.deploy_frontend }}" == "true" ]; then kubectl apply -f kube/frontend-deploy.yaml; fi
          if [ "${{ github.event.inputs.deploy_user_service }}" == "true" ]; then kubectl apply -f kube/user-service-deploy.yaml; fi
          if [ "${{ github.event.inputs.deploy_project_service }}" == "true" ]; then kubectl apply -f kube/project-service-deploy.yaml; fi
          if [ "${{ github.event.inputs.deploy_task_service }}" == "true" ]; then kubectl apply -f kube/task-service-deploy.yaml; fi
          if [ "${{ github.event.inputs.deploy_database }}" == "true" ]; then kubectl apply -f kube/postgres-deploy.yaml; fi
          
          # Always apply shared resources like Ingress
          kubectl apply -f kube/taskflow-ingress.yaml
